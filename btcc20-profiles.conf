# BTCC-20 inscription profiles.
#
# Default profile is "mainnet". Normal users do not need to pass any config
# arguments. If your local BTCC Core RPC password or wallet name is different,
# edit this file directly.

[mainnet]
chain=mainnet
rpc_url=http://127.0.0.1:28476
rpc_user=user
rpc_password=pass
wallet=miner

[local]
chain=regtest
rpc_url=http://127.0.0.1:28577
rpc_user=btcc20
rpc_password=btcc20
wallet=btcc20-opensource
